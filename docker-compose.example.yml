# Plantilla de despliegue — copia este archivo como docker-compose.yml y ajusta los dominios.
# El archivo docker-compose.yml con los dominios reales NO se versiona (.gitignore).

services:
  seguridad-web:
    image: nginx:alpine
    container_name: seguridad-web
    restart: unless-stopped
    volumes:
      - ./web:/usr/share/nginx/html:ro
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.seguridad.rule=Host(`PRIMARY_DOMAIN`)"
      - "traefik.http.routers.seguridad.entrypoints=websecure"
      - "traefik.http.routers.seguridad.tls.certresolver=letsencrypt"
      - "traefik.http.services.seguridad.loadbalancer.server.port=80"

networks:
  traefik:
    external: true
